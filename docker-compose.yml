# Local production-like stack (optional — for testing the Docker image before Railway)
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_APP_NAME: CEMAPROF
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      APP_NAME: CEMAPROF
      APP_ENV: local
      APP_DEBUG: "true"
      APP_KEY: ${APP_KEY}
      APP_URL: http://localhost:8080
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: cemaprof
      DB_USERNAME: cemaprof
      DB_PASSWORD: cemaprof
      SESSION_DRIVER: database
      CACHE_STORE: database
      QUEUE_CONNECTION: sync
      RUN_SEEDER: "true"
      WHATSAPP_NUMBER: "212600000000"
      MAIL_FROM_ADDRESS: contact@cemaprof.ma
      MAIL_FROM_NAME: CEMAPROF
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - app_storage:/var/www/html/storage

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cemaprof
      POSTGRES_USER: cemaprof
      POSTGRES_PASSWORD: cemaprof
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cemaprof -d cemaprof"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  app_storage:
  postgres_data:
